<!-- templates/auth/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard – Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #060d0a;
            --card:      rgba(13,26,18,0.92);
            --accent:    #00ff88;
            --teal:      #00ffcc;
            --red:       #ff4757;
            --yellow:    #ffd93d;
            --border:    rgba(0,255,136,0.2);
            --muted:     #3d6b50;
            --text:      #e0f5eb;
            --secondary: #7ab893;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .auth-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            box-shadow:
                0 0 0 1px rgba(0,255,136,0.1),
                0 0 40px rgba(0,255,136,0.08),
                inset 0 0 40px rgba(0,255,136,0.03);
            position: relative;
        }

        /* HUD corners */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 16px; height: 16px;
            border-top: 2px solid var(--teal);
            border-left: 2px solid var(--teal);
            border-radius: 3px 0 0 0;
        }

        .auth-card::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 16px; height: 16px;
            border-bottom: 2px solid var(--teal);
            border-right: 2px solid var(--teal);
            border-radius: 0 0 3px 0;
        }

        .auth-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .auth-logo svg {
            width: 60px; height: 60px;
            margin-bottom: 10px;
            animation: logoPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(0,255,136,0.7))
                    drop-shadow(0 0 20px rgba(0,255,200,0.4));
        }

        @keyframes logoPulse {
            0%,100% { filter: drop-shadow(0 0 6px rgba(0,255,136,0.6)) drop-shadow(0 0 16px rgba(0,255,200,0.3)); }
            50%      { filter: drop-shadow(0 0 14px rgba(0,255,136,1)) drop-shadow(0 0 30px rgba(0,255,200,0.7)); }
        }

        .auth-logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: var(--accent);
            text-shadow: 0 0 16px rgba(0,255,136,0.5);
        }

        .auth-logo p {
            font-size: 9px;
            letter-spacing: 4px;
            color: var(--muted);
            margin-top: 3px;
        }

        .auth-title    { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--text); margin-bottom: 4px; }
        .auth-subtitle { font-size: 12px; color: var(--secondary); margin-bottom: 22px; }

        .flash {
            padding: 10px 14px;
            border-radius: 7px;
            font-size: 12px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .flash.error   { background: rgba(255,71,87,0.12);  border: 1px solid rgba(255,71,87,0.35);  color: var(--red); }
        .flash.success { background: rgba(0,255,136,0.1);   border: 1px solid rgba(0,255,136,0.3);   color: var(--accent); }

        /* Two column grid for name fields */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group { margin-bottom: 14px; }

        .form-label {
            display: block;
            font-size: 10px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .input-wrap { position: relative; }

        .input-wrap i {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 13px;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(0,255,136,0.18);
            border-radius: 8px;
            padding: 11px 11px 11px 36px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(0,255,136,0.4),
                        0 0 16px rgba(0,255,136,0.15);
        }

        .input-wrap input::placeholder { color: var(--muted); }

        /* Validation indicator */
        .input-wrap input.valid   { border-color: rgba(0,255,136,0.5); }
        .input-wrap input.invalid { border-color: rgba(255,71,87,0.5); }

        .eye-toggle {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            transition: color 0.2s;
        }
        .eye-toggle:hover { color: var(--accent); }

        /* Password strength bar */
        .strength-bar-wrap {
            margin-top: 6px;
            height: 3px;
            background: rgba(0,255,136,0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .strength-label {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            text-align: right;
        }

        /* Terms */
        .terms-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 18px;
            font-size: 11px;
            color: var(--secondary);
        }

        .terms-row input[type="checkbox"] {
            accent-color: var(--accent);
            width: 14px; height: 14px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .terms-row a { color: var(--accent); text-decoration: none; }

        /* Submit */
        .btn-register {
            width: 100%;
            background: var(--accent);
            color: #060d0a;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            animation: btnPulse 2.5s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%,100% { box-shadow: 0 0 12px rgba(0,255,136,0.4); }
            50%      { box-shadow: 0 0 28px rgba(0,255,136,0.75); }
        }

        .btn-register:hover {
            background: var(--teal);
            box-shadow: 0 0 32px rgba(0,255,136,0.6) !important;
            transform: translateY(-1px);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
        }
        .auth-divider::before,
        .auth-divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,255,136,0.1); }
        .auth-divider span   { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

        .auth-footer {
            text-align: center;
            font-size: 12px;
            color: var(--secondary);
            margin-top: 18px;
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover { text-shadow: 0 0 8px rgba(0,255,136,0.6); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.3); border-radius: 2px; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="sGlow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="2.5" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <linearGradient id="sGrad" x1="27" y1="2" x2="27" y2="52" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#00ffcc"/>
                        <stop offset="100%" stop-color="#00aa55"/>
                    </linearGradient>
                    <radialGradient id="sBg" cx="50%" cy="40%" r="60%">
                        <stop offset="0%"   stop-color="#003322"/>
                        <stop offset="100%" stop-color="#001510"/>
                    </radialGradient>
                </defs>
                <circle cx="27" cy="27" r="25.5" fill="rgba(0,255,136,0.05)"/>
                <circle cx="27" cy="27" r="24.5" stroke="rgba(0,255,136,0.15)"
                        stroke-width="0.6" stroke-dasharray="3 4" fill="none"/>
                <line x1="7"  y1="5"  x2="11" y2="5"  stroke="rgba(0,255,200,0.55)" stroke-width="0.9"/>
                <line x1="7"  y1="5"  x2="7"  y2="9"  stroke="rgba(0,255,200,0.55)" stroke-width="0.9"/>
                <line x1="47" y1="5"  x2="43" y2="5"  stroke="rgba(0,255,200,0.55)" stroke-width="0.9"/>
                <line x1="47" y1="5"  x2="47" y2="9"  stroke="rgba(0,255,200,0.55)" stroke-width="0.9"/>
                <path d="M27 4 L47 10 L47 26 C47 38 38 46 27 49.5 C16 46 7 38 7 26 L7 10 Z"
                      fill="url(#sBg)" stroke="url(#sGrad)" stroke-width="1.6"
                      filter="url(#sGlow)"/>
                <path d="M27 8 L43 13.5 L43 26 C43 35.5 35.5 42.5 27 45.5 C18.5 42.5 11 35.5 11 26 L11 13.5 Z"
                      fill="rgba(0,40,24,0.4)" stroke="rgba(0,255,180,0.28)" stroke-width="0.8"/>
                <rect x="18.5" y="30" width="17" height="13" rx="2.5"
                      fill="rgba(0,255,136,0.14)" stroke="#00ffcc" stroke-width="1.3"
                      filter="url(#sGlow)"/>
                <path d="M21 30 L21 26.5 C21 22.5 33 22.5 33 26.5 L33 30"
                      fill="none" stroke="#00ffcc" stroke-width="1.5"
                      stroke-linecap="round" filter="url(#sGlow)"/>
                <circle cx="27" cy="35.5" r="2.2" fill="rgba(0,10,6,0.95)"
                        stroke="rgba(0,255,180,0.55)" stroke-width="0.8"/>
                <rect x="26.2" y="36.8" width="1.6" height="3.5" rx="0.8"
                      fill="rgba(0,10,6,0.95)"/>
            </svg>
            <h1>PhishGuard</h1>
            <p>URL ANALYZER</p>
        </div>

        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join PhishGuard to start protecting yourself</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="flash {{ category }}">
                <i class="fas fa-{% if category == 'error' %}triangle-exclamation{% else %}circle-check{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}" id="registerForm">

            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" id="username"
                           placeholder="Choose a username"
                           autocomplete="username"
                           oninput="validateUsername(this)" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" id="email"
                           placeholder="your@email.com"
                           autocomplete="email"
                           oninput="validateEmail(this)" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password"
                           placeholder="Min 8 characters"
                           autocomplete="new-password"
                           oninput="checkStrength(this)" required/>
                    <span class="eye-toggle" onclick="togglePwd('password', this)">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <div class="strength-bar-wrap">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="confirm_password" id="confirmPassword"
                           placeholder="Repeat your password"
                           autocomplete="new-password"
                           oninput="validateConfirm(this)" required/>
                    <span class="eye-toggle" onclick="togglePwd('confirmPassword', this)">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <div class="terms-row">
                <input type="checkbox" id="terms" required/>
                <label for="terms">
                    I agree to the <a href="#">Terms of Service</a> and
                    <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i>
                CREATE ACCOUNT
            </button>

        </form>

        <div class="auth-divider"><span>ALREADY REGISTERED</span></div>

        <div class="auth-footer">
            Have an account?
            <a href="{{ url_for('login') }}">Sign in here</a>
        </div>

    </div>
</div>

<script>
// Background canvas (same as login)
const canvas = document.getElementById("bgCanvas");
const ctx    = canvas.getContext("2d");
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize(); window.addEventListener("resize",resize);
const circuits=Array.from({length:14},()=>{const pts=[{x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight}];for(let i=0;i<4;i++){const l=pts[pts.length-1];const h=Math.random()>0.5;const d=Math.random()*80+30;pts.push({x:h?l.x+(Math.random()>0.5?d:-d):l.x,y:h?l.y:l.y+(Math.random()>0.5?d:-d)});}return{pts,alpha:Math.random()*0.45+0.12,w:Math.random()>0.7?1.4:0.8,dot:{p:Math.random(),s:Math.random()*0.004+0.002}};});
const particles=Array.from({length:55},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.6+0.5,a:Math.random()*0.55+0.15,dx:(Math.random()-0.5)*0.4,dy:(Math.random()-0.5)*0.4,ph:Math.random()*Math.PI*2}));
function tLen(p){let l=0;for(let i=1;i<p.length;i++){const dx=p[i].x-p[i-1].x,dy=p[i].y-p[i-1].y;l+=Math.sqrt(dx*dx+dy*dy);}return l;}
function ptAt(p,t){let d=tLen(p)*t;for(let i=1;i<p.length;i++){const dx=p[i].x-p[i-1].x,dy=p[i].y-p[i-1].y,s=Math.sqrt(dx*dx+dy*dy);if(d<=s){const r=d/s;return{x:p[i-1].x+dx*r,y:p[i-1].y+dy*r};}d-=s;}return p[p.length-1];}
function animate(t){
    ctx.fillStyle="#060d0a";ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle="rgba(0,255,136,0.09)";ctx.lineWidth=0.5;
    for(let x=0;x<canvas.width;x+=38){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height;y+=38){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    circuits.forEach(c=>{ctx.beginPath();ctx.moveTo(c.pts[0].x,c.pts[0].y);for(let i=1;i<c.pts.length;i++)ctx.lineTo(c.pts[i].x,c.pts[i].y);ctx.strokeStyle=`rgba(0,255,136,${c.alpha})`;ctx.lineWidth=c.w;ctx.stroke();c.pts.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x,pt.y,2,0,Math.PI*2);ctx.fillStyle=`rgba(0,255,136,${c.alpha*2})`;ctx.fill();});c.dot.p+=c.dot.s;if(c.dot.p>1)c.dot.p=0;const pos=ptAt(c.pts,c.dot.p);ctx.beginPath();ctx.arc(pos.x,pos.y,3,0,Math.PI*2);ctx.fillStyle="rgba(0,255,200,0.9)";ctx.shadowBlur=12;ctx.shadowColor="rgba(0,255,136,1)";ctx.fill();ctx.shadowBlur=0;});
    particles.forEach(p=>{const a=p.a*(0.6+0.4*Math.sin(t*0.001+p.ph));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,255,136,${a})`;ctx.shadowBlur=7;ctx.shadowColor="rgba(0,255,136,0.8)";ctx.fill();ctx.shadowBlur=0;p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;});
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ── FORM VALIDATION ──────────────────────────────────────────
function togglePwd(id, el) {
    const inp  = document.getElementById(id);
    const icon = el.querySelector("i");
    inp.type   = inp.type === "password" ? "text" : "password";
    icon.className = inp.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
}

function validateUsername(el) {
    el.className = el.value.length >= 3 ? "valid" : "invalid";
}

function validateEmail(el) {
    el.className = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value) ? "valid" : "invalid";
}

function validateConfirm(el) {
    const pwd = document.getElementById("password").value;
    el.className = el.value === pwd && el.value.length > 0 ? "valid" : "invalid";
}

function checkStrength(el) {
    const v   = el.value;
    const bar = document.getElementById("strengthBar");
    const lbl = document.getElementById("strengthLabel");
    let   score = 0;
    if (v.length >= 8)               score++;
    if (v.length >= 12)              score++;
    if (/[A-Z]/.test(v))             score++;
    if (/[0-9]/.test(v))             score++;
    if (/[^A-Za-z0-9]/.test(v))      score++;

    const levels = [
        { pct: "0%",   color: "transparent",          label: "" },
        { pct: "25%",  color: "#ff4757",               label: "Weak" },
        { pct: "50%",  color: "#ffd93d",               label: "Fair" },
        { pct: "75%",  color: "#00d4aa",               label: "Good" },
        { pct: "100%", color: "#00ff88",               label: "Strong" },
        { pct: "100%", color: "#00ffcc",               label: "Very Strong" },
    ];

    const lvl      = levels[Math.min(score, 5)];
    bar.style.width      = lvl.pct;
    bar.style.background = lvl.color;
    lbl.textContent      = lvl.label;
    lbl.style.color      = lvl.color;

    el.className = score >= 2 ? "valid" : score === 1 ? "invalid" : "";
}
</script>

</body>
</html>
